<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Pro Members | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --dark: #1e293b;
            --light: #f5f3ff;
            --white: #ffffff;
            --gray: #64748b;
            --success: #22c55e;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6; 
            color: var(--dark); 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .logo { 
            text-align: center; 
            font-size: 2.5rem; 
            margin-bottom: 10px;
        }
        h1 { 
            text-align: center; 
            font-size: 1.5rem; 
            margin-bottom: 8px;
            color: var(--dark);
        }
        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600;
            color: var(--dark);
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .error.show { display: block; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--gray);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🦁</div>
        <h1>OpenClaw Pro Members</h1>
        <p class="subtitle">Access your templates and resources</p>
        
        <div class="error" id="error">Invalid email or password</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">Access Members Area</button>
        </form>
        
        <div class="back-link">
            <a href="index.html">← Back to homepage</a>
        </div>
    </div>

    <script>
        // Simple member authentication (in production, use a real backend)
        const members = {
            'member@openclaw.pro': 'member2024',
            'pro@openclaw.pro': 'pro2024',
            'vip@openclaw.pro': 'vip2024'
        };
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (members[email] && members[email] === password) {
                // Store session
                localStorage.setItem('memberEmail', email);
                localStorage.setItem('memberName', email.split('@')[0]);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').classList.add('show');
            }
        });
    </script>
</body>
</html>
